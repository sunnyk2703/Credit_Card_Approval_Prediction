<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Approval Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">

    <h1>💳 Credit Card Approval Prediction</h1>
    <p class="subtitle">
        Enter Applicant Details
    </p>

    <form id="predictionForm">

        <div class="input-group">
            <label>Gender</label>
            <select id="Gender">
                <option>Male</option>
                <option>Female</option>
            </select>
        </div>

        <div class="input-group">
            <label>Married</label>
            <select id="Married">
                <option>Yes</option>
                <option>No</option>
            </select>
        </div>

        <div class="input-group">
            <label>Dependents</label>
            <input type="number" id="Dependents" placeholder="0">
        </div>

        <div class="input-group">
            <label>Education</label>
            <select id="Education">
                <option>Graduate</option>
                <option>Not Graduate</option>
            </select>
        </div>

        <div class="input-group">
            <label>Self Employed</label>
            <select id="Self_Employed">
                <option>No</option>
                <option>Yes</option>
            </select>
        </div>

        <div class="input-group">
            <label>Applicant Income</label>
            <input type="number" id="ApplicantIncome">
        </div>

        <div class="input-group">
            <label>Coapplicant Income</label>
            <input type="number" id="CoapplicantIncome">
        </div>

        <div class="input-group">
            <label>Loan Amount</label>
            <input type="number" id="LoanAmount">
        </div>

        <div class="input-group">
            <label>Loan Amount Term</label>
            <input type="number" id="Loan_Amount_Term">
        </div>

        <div class="input-group">
            <label>Credit History</label>
            <select id="Credit_History">
                <option value="1">Good</option>
                <option value="0">Bad</option>
            </select>
        </div>

        <div class="input-group">
            <label>Property Area</label>
            <select id="Property_Area">
                <option>Urban</option>
                <option>Semiurban</option>
                <option>Rural</option>
            </select>
        </div>

        <button type="submit">
            Predict
        </button>

    </form>

    <div id="result"></div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
